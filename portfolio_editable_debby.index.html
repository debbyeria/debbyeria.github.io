.s-title{font-family:'DM Serif Display',serif;font-size:clamp(26px,4vw,40px);color:var(--navy);margin-bottom:52px;line-height:1.1}
.pcard{background:var(--white);border:1px solid var(--border);border-radius:4px;margin-bottom:28px;overflow:hidden;transition:box-shadow .3s,transform .3s}
.pcard:hover{box-shadow:0 14px 48px rgba(13,27,42,.09);transform:translateY(-2px)}
.pcard-hdr{padding:28px 32px 22px;border-bottom:1px solid var(--border-l);cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;gap:20px}
.pcard-tag{font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--blue-l);margin-bottom:6px}
.pcard-title{font-family:'DM Serif Display',serif;font-size:22px;color:var(--navy);line-height:1.2;margin-bottom:4px}
.pcard-period{font-size:12px;color:var(--text-g)}
.pills{display:flex;flex-wrap:wrap;gap:8px;flex-shrink:0}
.pill{font-size:11px;font-weight:600;padding:5px 12px;border-radius:2px;white-space:nowrap}
.pill-navy{background:var(--navy);color:var(--accent-l)}
.pill-green{background:var(--green);color:var(--green-t)}
.toggle{font-size:18px;color:var(--blue-l);transition:transform .3s;flex-shrink:0;margin-top:4px}
.open .toggle{transform:rotate(180deg)}
.pcard-body{display:none;padding:0 32px 32px}
.open .pcard-body{display:block}
.bgrid{display:grid;grid-template-columns:1fr 1fr;gap:28px;margin-top:24px}
.bfull{grid-column:1/-1}
.blabel{font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--text-g);margin-bottom:10px}
.btext{font-size:13px;color:var(--text-m);line-height:1.7}
.steps{display:flex;flex-direction:column}
.step{display:flex;gap:14px;align-items:flex-start}
.step-line{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.sdot{width:26px;height:26px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;flex-shrink:0}
.sconn{width:2px;flex:1;min-height:14px;background:var(--border);margin:4px 0}
.step:last-child .sconn{display:none}
.step-c{padding-bottom:16px}
.step-t{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:3px}
.step-d{font-size:13px;color:var(--text-m);line-height:1.65}
.ogrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px}
.obox{background:var(--cream);border:1px solid var(--border);border-radius:3px;padding:14px;text-align:center}
.onum{font-family:'DM Serif Display',serif;font-size:24px;color:var(--blue);line-height:1;margin-bottom:4px}
.odesc{font-size:11px;color:var(--text-g);line-height:1.4}
.skill-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.sk{background:var(--navy);color:rgba(255,255,255,.75);font-size:11px;padding:4px 10px;border-radius:2px}
.chal-list{display:flex;flex-direction:column;gap:8px}
.chal-item{display:flex;align-items:flex-start;gap:10px;font-size:13px;color:var(--text-m)}
.cdot{width:6px;height:6px;border-radius:50%;background:#BA7517;flex-shrink:0;margin-top:6px}
.lesson{background:linear-gradient(135deg,#EEF4FA,#E8F0F8);border:1px solid #C5D8EC;border-radius:4px;padding:16px 20px;margin-top:8px}
.lesson-lbl{font-size:10px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--blue);margin-bottom:6px}
.lesson-txt{font-size:13px;color:var(--navy-m);line-height:1.7}
.about-wrap{background:var(--navy);padding:88px 0}
.about-wrap .s-eye{color:var(--accent)}
.about-wrap .s-title{color:#fff;margin-bottom:28px}
.about-txt{font-size:16px;color:rgba(255,255,255,.65);line-height:1.85;max-width:640px;margin-bottom:44px}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.sbox{border:1px solid rgba(59,110,165,.22);padding:18px;border-radius:3px}
.sbox-t{font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
.sbox-i{font-size:12px;color:rgba(255,255,255,.5);line-height:1.9}
footer{background:#060E17;padding:36px 48px;text-align:center}
.ft-name{font-family:'DM Serif Display',serif;font-size:18px;color:rgba(255,255,255,.65);margin-bottom:6px}
.ft-sub{font-size:12px;color:rgba(255,255,255,.28)}
.fade{opacity:0;transform:translateY(20px);transition:opacity .55s ease,transform .55s ease}
.fade.on{opacity:1;transform:translateY(0)}
hr.divider{border:none;border-top:1px solid var(--border-l);margin:8px 0}
@media(max-width:680px){nav{padding:0 20px}.nav-links{display:none}.hero{padding:100px 20px 60px}.hero-metrics{gap:24px}.wrap{padding:0 20px}.bgrid{grid-template-columns:1fr}.sgrid{grid-template-columns:1fr}footer{padding:28px 20px}.pcard-hdr{flex-direction:column}.pills{margin-top:10px}}
</style>

<!-- Rendered by JS below -->
<div id="app"></div>

<script>
// ── RENDERER ──────────────────────────────────────────────────────────────────
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'class') el.className = v;
    else if (k === 'html') el.innerHTML = v;
    else el.setAttribute(k, v);
  });
  children.flat(Infinity).forEach(c => {
    if (!c && c !== 0) return;
    el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return el;
}

function buildNav() {
  const nav = h('nav', {},
    h('div', {class:'nav-name'}, PROFILE.name),
    h('div', {class:'nav-links'},
      h('a', {href:'#projects'}, 'Projects'),
      h('a', {href:'#about'}, 'About'),
    )
  );
  return nav;
}

function buildHero() {
  const metrics = METRICS.map(m =>
    h('div', {},
      h('div', {class:'m-num'}, m.num),
      h('div', {class:'m-label'}, m.label),
    )
  );
  return h('section', {class:'hero'},
    h('div', {class:'hero-grid'}),
    h('div', {class:'hero-glow'}),
    h('div', {class:'wrap'},
      h('div', {class:'hero-inner'},
        h('div', {class:'hero-eye'}, 'Program Manager Portfolio · 2020–Present'),
        h('h1', {}, 'Turning ambiguity\ninto ', h('em', {}, 'systems.')),
        h('div', {class:'hero-sub'}, `${PROFILE.name} · ${PROFILE.company} · ${PROFILE.location}`),
        h('p', {class:'hero-desc'}, PROFILE.tagline),
        h('div', {class:'hero-metrics'}, ...metrics),
      )
    )
  );
}

function buildProject(p, idx) {
  const id = `proj-${idx}`;

  const pills = p.pills.map((text, i) =>
    h('span', {class:`pill pill-${(p.pillStyle||[])[i]||'navy'}`}, text)
  );

  const stepEls = p.steps.map((s, i) =>
    h('div', {class:'step'},
      h('div', {class:'step-line'},
        h('div', {class:'sdot'}, String(i+1)),
        h('div', {class:'sconn'}),
      ),
      h('div', {class:'step-c'},
        h('div', {class:'step-t'}, s.title),
        h('div', {class:'step-d'}, s.desc),
      )
    )
  );

  const oboxEls = p.outcomes.map(o =>
    h('div', {class:'obox'},
      h('div', {class:'onum'}, o.num),
      h('div', {class:'odesc'}, o.desc),
    )
  );

  const chalEls = (p.challenges||[]).map(c =>
    h('div', {class:'chal-item'},
      h('div', {class:'cdot'}),
      c,
    )
  );

  const skillEls = (p.skills||[]).map(sk => h('span', {class:'sk'}, sk));

  const card = h('div', {class:'pcard fade', id},
    h('div', {class:'pcard-hdr', onclick:`toggle('${id}')`},
      h('div', {},
        h('div', {class:'pcard-tag'}, p.tag),
        h('div', {class:'pcard-title'}, p.title),
        h('div', {class:'pcard-period'}, p.period),
      ),
      h('div', {style:'display:flex;align-items:flex-start;gap:12px'},
        h('div', {class:'pills'}, ...pills),
        h('div', {class:'toggle'}, '▾'),
      )
    ),
    h('div', {class:'pcard-body'},
      h('div', {class:'bgrid'},
        h('div', {},
          h('div', {class:'blabel'}, 'Background & Problem'),
          h('p', {class:'btext'}, p.background),
        ),
        h('div', {},
          h('div', {class:'blabel'}, 'My Role'),
          h('p', {class:'btext', style:'margin-bottom:12px'}, p.role),
          h('div', {class:'blabel'}, 'Skills Applied'),
          h('div', {class:'skill-tags'}, ...skillEls),
        ),
      ),
      h('div', {style:'margin-top:28px'},
        h('div', {class:'blabel'}, 'Step-by-Step Process'),
        h('div', {class:'steps'}, ...stepEls),
      ),
      h('div', {class:'bgrid', style:'margin-top:28px'},
        chalEls.length ? h('div', {},
          h('div', {class:'blabel'}, 'Challenges & How I Navigated Them'),
          h('div', {class:'chal-list'}, ...chalEls),
        ) : h('div', {}),
        h('div', {},
          h('div', {class:'blabel'}, 'Results'),
          h('div', {class:'ogrid'}, ...oboxEls),
        ),
        h('div', {class:'bfull'},
          h('div', {class:'lesson'},
            h('div', {class:'lesson-lbl'}, 'Key Learning'),
            h('div', {class:'lesson-txt'}, p.lesson),
          )
        ),
      ),
    )
  );
  return card;
}

function buildAbout() {
  const sboxes = SKILLS.map(s =>
    h('div', {class:'sbox'},
      h('div', {class:'sbox-t'}, s.title),
      h('div', {class:'sbox-i'}, s.items.join('\n')),
    )
  );
  return h('section', {class:'about-wrap', id:'about'},
    h('div', {class:'wrap'},
      h('div', {class:'s-eye'}, 'About'),
      h('div', {class:'s-title'}, 'The Through-Line'),
      h('p', {class:'about-txt'}, PROFILE.about),
      h('div', {class:'sgrid'}, ...sboxes),
    )
  );
}

function buildFooter() {
  return h('footer', {},
    h('div', {class:'ft-name'}, PROFILE.name),
    h('div', {class:'ft-sub'}, `${PROFILE.title} · ${PROFILE.company} · ${PROFILE.location} · ${PROFILE.email}`),
  );
}

// ── INIT ──────────────────────────────────────────────────────────────────────
function toggle(id) {
  document.getElementById(id).classList.toggle('open');
}

document.addEventListener('DOMContentLoaded', () => {
  const app = document.getElementById('app');
  app.appendChild(buildNav());
  app.appendChild(buildHero());

  const sec = h('section', {class:'section', id:'projects'},
    h('div', {class:'wrap'},
      h('div', {class:'s-eye'}, 'Selected Work'),
      h('div', {class:'s-title'}, 'Programs & Initiatives'),
      ...PROJECTS.map((p, i) => buildProject(p, i)),
    )
  );
  app.appendChild(sec);
  app.appendChild(buildAbout());
  app.appendChild(buildFooter());

  const obs = new IntersectionObserver((entries) => {
    entries.forEach((e, i) => {
      if (e.isIntersecting) setTimeout(() => e.target.classList.add('on'), i * 80);
    });
  }, { threshold: 0.08 });
  document.querySelectorAll('.fade').forEach(el => obs.observe(el));
});
</script>
</body>
</html>
